<div class="card">
  <h2>Run Summary Scoring</h2>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="tenantId">Tenant ID</label>
      <input
        id="tenantId"
        type="text"
        formControlName="tenantId"
        placeholder="Enter tenant ID"
        class="form-control"
      />
    </div>
    <div class="form-group">
      <label for="jwtToken">JWT Auth Token</label>
      <input
        id="jwtToken"
        type="password"
        formControlName="jwtToken"
        placeholder="Enter JWT token"
        class="form-control"
      />
    </div>
    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>
    <button
      type="submit"
      class="btn-primary"
      [disabled]="isLoading || form.invalid"
    >
      <span *ngIf="isLoading">Scoring in progress...</span>
      <span *ngIf="!isLoading">Run Scoring</span>
    </button>
  </form>
</div>
